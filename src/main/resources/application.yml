spring:
  application:
    name: booklibrary
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
  flyway:
    enabled: true
    locations: classpath:db/migration
  docker:
    compose:
      lifecycle-management: start-only
      file: compose.yaml

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
